name: Build Flatpak WPE Layer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/flatpak-wpe-layer.yaml'
      - 'flatpak/com.github.lingyan000.fluxdo.wpe-layer.yml'
      - 'flatpak/wpe-layer.version'
      - 'scripts/ci/flatpak/package_wpe_layer.sh'

jobs:
  build_wpe_layer:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read layer version
        id: layer
        run: |
          version="$(tr -d '\r\n' < flatpak/wpe-layer.version)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build WPE layer
        run: |
          flatpak --system remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          xvfb-run --auto-servernum flatpak-builder \
            --repo=repo \
            --disable-rofiles-fuse \
            --install-deps-from=flathub \
            --force-clean \
            --default-branch=stable \
            --arch=x86_64 \
            --ccache \
            --verbose \
            flatpak_wpe_layer \
            flatpak/com.github.lingyan000.fluxdo.wpe-layer.yml

      - name: Package WPE layer
        run: |
          mkdir -p dist
          bash scripts/ci/flatpak/package_wpe_layer.sh \
            flatpak_wpe_layer \
            dist/fluxdo-flatpak-wpe-layer-gnome48-x86_64.tar.zst

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-wpe-layer-gnome48-x86_64
          path: |
            dist/fluxdo-flatpak-wpe-layer-gnome48-x86_64.tar.zst
            dist/fluxdo-flatpak-wpe-layer-gnome48-x86_64.tar.zst.sha256
          if-no-files-found: error
          overwrite: true

      - name: Publish WPE layer release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: flatpak-wpe-layer-${{ steps.layer.outputs.version }}
          name: Flatpak WPE Layer ${{ steps.layer.outputs.version }}
          body: |
            Prebuilt Flatpak WPE dependency layer for Fluxdo.
          prerelease: true
          make_latest: false
          files: |
            dist/fluxdo-flatpak-wpe-layer-gnome48-x86_64.tar.zst
            dist/fluxdo-flatpak-wpe-layer-gnome48-x86_64.tar.zst.sha256
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
