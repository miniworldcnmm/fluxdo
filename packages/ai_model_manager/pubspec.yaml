name: ai_model_manager
description: AI 模型服务配置管理
publish_to: none

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.10.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod:
  dio:
  http: ^1.6.0
  flutter_secure_storage:
  shared_preferences:
  path_provider:
  path:
  uuid:
  jovial_svg: ^1.1.29  # 用于渲染 ModelIcon 中的 brand SVG（CC0 simple-icons 资产）
  # 直接用各 LLM provider 的官方 SDK，不经过 langchain_dart 抽象层
  openai_dart: ^4.3.0           # 同时覆盖 Chat Completions + Responses API
  googleai_dart: ^3.6.0         # Gemini
  anthropic_sdk_dart: ^0.3.1    # Anthropic + Extended Thinking

dev_dependencies:
  flutter_test:
    sdk: flutter
