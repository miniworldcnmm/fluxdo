app-id: com.github.lingyan000.fluxdo
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
  - org.freedesktop.Sdk.Extension.rust-stable
command: fluxdo
separate-locales: false
build-options:
  append-path: /usr/lib/sdk/llvm20/bin
  prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=system-bus
  - --device=dri
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=xdg-download:rw
  - --filesystem=xdg-documents:rw
modules:
  - name: wpe-layer
    buildsystem: simple
    build-commands:
      - |
        set -eu
        for dir in bin include lib libexec share; do
          if [ -e "${dir}" ]; then
            cp -a "${dir}" /app/
          fi
        done
    sources:
      - type: archive
        path: stage/wpe-layer/fluxdo-flatpak-wpe-layer-gnome48-x86_64.tar.zst

  - name: fluxdo
    buildsystem: simple
    build-commands:
      - install -d /app/bin /app/fluxdo /app/share/applications /app/share/icons/hicolor/512x512/apps /app/share/metainfo
      - bash source-tree/scripts/ci/flatpak/build_app.sh "$(pwd)/source-tree" /app/fluxdo
      - install -Dm755 source-tree/flatpak/fluxdo-wrapper.sh /app/bin/fluxdo
      - install -Dm644 source-tree/flatpak/com.github.lingyan000.fluxdo.desktop /app/share/applications/com.github.lingyan000.fluxdo.desktop
      - install -Dm644 source-tree/flatpak/com.github.lingyan000.fluxdo.metainfo.xml /app/share/metainfo/com.github.lingyan000.fluxdo.metainfo.xml
      - install -Dm644 source-tree/flatpak/icons/com.github.lingyan000.fluxdo.png /app/share/icons/hicolor/512x512/apps/com.github.lingyan000.fluxdo.png
      - rm -rf /app/include /app/lib/pkgconfig /app/share/pkgconfig /app/share/aclocal
      - rm -f /app/bin/unifdef /app/bin/woff2_compress /app/bin/woff2_decompress
    sources:
      - type: dir
        path: stage/source-tree
        dest: source-tree
